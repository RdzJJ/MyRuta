<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Fondo circular -->
  <circle cx="50" cy="50" r="48" fill="#000000" stroke="#00FF88" stroke-width="3"/>
  
  <!-- Bus -->
  <g transform="translate(25, 20)">
    <!-- Cuerpo del bus -->
    <path d="M 10 8 L 40 8 Q 45 8 45 13 L 45 35 Q 45 40 40 40 L 10 40 Q 5 40 5 35 L 5 13 Q 5 8 10 8" 
          fill="none" stroke="#00FF88" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Ventanas -->
    <rect x="8" y="10" width="8" height="8" fill="none" stroke="#00FF88" stroke-width="1.5" rx="1"/>
    <rect x="20" y="10" width="8" height="8" fill="none" stroke="#00FF88" stroke-width="1.5" rx="1"/>
    <rect x="32" y="10" width="8" height="8" fill="none" stroke="#00FF88" stroke-width="1.5" rx="1"/>
    
    <!-- Faros -->
    <circle cx="8" cy="30" r="2" fill="#00FF88"/>
    <circle cx="37" cy="30" r="2" fill="#00FF88"/>
    
    <!-- Ruedas -->
    <circle cx="12" cy="42" r="4" fill="none" stroke="#00FF88" stroke-width="1.5"/>
    <circle cx="33" cy="42" r="4" fill="none" stroke="#00FF88" stroke-width="1.5"/>
  </g>
  
  <!-- Línea de carretera -->
  <path d="M 60 40 Q 65 35 70 40" fill="none" stroke="#00FF88" stroke-width="2" stroke-linecap="round"/>
  <path d="M 65 48 Q 70 43 75 48" fill="none" stroke="#00FF88" stroke-width="2" stroke-linecap="round"/>
</svg>