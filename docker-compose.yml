# Docker Compose configuration for MyRuta development environment
# Services: PostgreSQL, Redis
# Usage: docker-compose up -d

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: myruta_postgres
    environment:
      POSTGRES_USER: myruta_user
      POSTGRES_PASSWORD: myruta_password
      POSTGRES_DB: myruta
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myruta_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myruta_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: myruta_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myruta_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  myruta_network:
    driver: bridge
