name: myruta_mobile
description: "MyRuta - Mobile App for Transport Monitoring (Flutter)"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Networking
  http: ^1.1.0
  socket_io_client: ^2.0.0

  # Maps
  google_maps_flutter: ^2.4.0

  # Location
  geolocator: ^9.0.0
  location: ^4.4.0

  # Storage
  shared_preferences: ^2.2.0
  get_storage: ^2.1.0

  # Auth
  flutter_secure_storage: ^9.0.0

  # UI
  cupertino_icons: ^1.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/

  # Fonts
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
